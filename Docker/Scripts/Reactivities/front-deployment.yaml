apiVersion: apps/v1
kind: Deployment
metadata:
 name: reactivities-front
spec:
 replicas: 1
 selector:
  matchLabels:
   component: reactivities-front
 template:
  metadata:
   labels:
    component: reactivities-front
  spec:
   containers:
    - name: reactivities-front
      image: kozlovas/reactivities-front
      imagePullPolicy: IfNotPresent
      ports:
       - containerPort: 80
      env:
       - name: REACT_APP_API_URL
         value: "/api"
       - name: REACT_APP_CHAT_URL
         value: "/chat"
---
apiVersion: v1
kind: Service
metadata:
 name: reactivities-front-cluster-ip-service
spec:
 type: ClusterIP
 ports:
  - port: 80
    targetPort: 80
 selector:
  component: reactivities-front
