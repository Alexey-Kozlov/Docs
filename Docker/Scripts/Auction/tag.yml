apiVersion: apps/v1
kind: Deployment
metadata:
  name: auction-tag
spec:
  selector:
    matchLabels:
      app: auction-tag
  template:
    metadata:
      labels:
        app: auction-tag
    spec:
      containers:
      - name: auction-tag
        image: kozlovas/auction-tag
        imagePullPolicy: IfNotPresent
        startupProbe:
          httpGet:
            path: /checkvault
            port: 80
            scheme: HTTP
            host: 10.108.29.192
          failureThreshold: 60
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "1"
          requests:
            cpu: "0.5"
---
apiVersion: v1
kind: Service
metadata:
  name: auction-tag-clusterip
spec:
  type: ClusterIP
  selector:
    app: auction-tag
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: auction-tag-clusterip-grpc
spec:
  type: ClusterIP
  selector:
    app: auction-tag
  ports:
  - port: 7785
    targetPort: 7785
    name: grpc
